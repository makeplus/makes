# Local nono profile overrides for Claude Code.
# Edit this file and run: make claude-local-nono-profile-update
# See: https://nono.sh/docs/cli/features/profiles-groups.md

meta:
  name: claude-code-local
  version: 1.0.0
  description: Local Claude Code nono profile overrides

# Inherit all settings from the built-in claude-code profile.
extends: claude-code

# Filesystem access rules.
# Paths support: $WORKDIR, $HOME, $XDG_CONFIG_HOME, $TMPDIR
filesystem:
  # Read-only directory access:
  read: []
  # read:
  # - $HOME/shared-libs
  # - /opt/data

  # Read+write directory access:
  allow: []
  # allow:
  # - $HOME/projects/other-repo

  # Read-only file access:
  # read_file: []

  # Read+write file access:
  # allow_file: []

# Security policy overrides.
policy:
  # Block access to specific paths:
  add_deny_access: []
  # add_deny_access:
  # - $HOME/.ssh
  # - $HOME/.aws

  # Block specific commands:
  add_deny_commands: []
  # add_deny_commands:
  # - docker
  # - kubectl

  # Remove inherited security groups:
  # exclude_groups: []

# Network controls.
network:
  # Additional allowed domains:
  allow_domain: []
  # allow_domain:
  # - api.example.com
  # - registry.npmjs.org

  # Block all network access:
  # block: true

# Rollback exclusions (paths to skip during snapshots).
# rollback:
#   exclude_patterns:
#   - node_modules
#   - .next
#   exclude_globs:
#   - "*.tmp.*"

# Heavy directories to skip during trust scanning.
# skipdirs:
# - node_modules
# - .git

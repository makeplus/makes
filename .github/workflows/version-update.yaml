name: Version Update

on:
  schedule:
  - cron: 0 4 * * *
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache local dependencies
      uses: actions/cache@v4
      with:
        path: local/
        key: ${{ runner.os }}-makes-local-${{ hashFiles('*.mk') }}
        restore-keys: ${{ runner.os }}-makes-local-

    - name: Configure git
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Update versions
      run: make version-update

    - name: Commit and push changes
      run: |
        if git diff --quiet; then
          echo 'All versions already up to date'
          exit 0
        fi
        git add *.mk
        git commit -m 'Update versions'
        git push

# Name:
#   desc: >
#     Language description. 1-3 sentences.
#   slug: Lower case word that is name of .mk file
#   makes: Has a .mk file here
#   fast: Can install from prebuilt binary
#   docker: Fully qualified public container image name
#   linux: Supports Linux
#   macos: Supports macOS
#   win: Support Windows
#   ffi: Supports FFI for linking to shared libraries. .so, .dylib, .dll
#   json: Supports reading and writing JSON
#   exer: Is a language on exercism.org
#   ship: # Info about publishing libraries for the language
#     registry:
#     site:
#     package:
#     publish:
#     auth:

